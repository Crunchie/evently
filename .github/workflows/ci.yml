name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Tests
        run: uv run pytest -q

      - name: Audit dependencies for known vulnerabilities
        # --no-deps is safe: uv export emits the full frozen lock, transitive deps included.
        run: |
          uv export --frozen --no-hashes --no-emit-project -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt --disable-pip --no-deps
